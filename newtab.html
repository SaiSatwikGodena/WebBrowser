<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>New Tab</title>
    <style>
      body { font-family: system-ui, Arial; margin:0; display:flex; flex-direction:column; height:100vh; align-items:center; justify-content:center; background:#0f1724; color:#e6eef8; }
      .clock { font-size:48px; margin-bottom:8px; }
      .search { display:flex; gap:8px; }
      input[type="search"] { font-size:16px; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); width:360px; }
      button { padding:8px 12px; border-radius:8px; background:#2563eb; color:white; border:none; }
      .links { margin-top:18px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
      .link { background:rgba(255,255,255,0.04); padding:6px 10px; border-radius:8px; color:inherit; text-decoration:none; }
    </style>
  </head>
  <body>
    <div class="clock" id="clock">--:--</div>
    <form id="searchForm" class="search" action="" onsubmit="return false;">
      <input id="q" type="search" placeholder="Search Google or type URL" />
      <button id="go">Go</button>
    </form>
    <div class="links" id="links"></div>
    <script src="main.js"></script>
  </body>
</html>
